name: Build Web Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    name: Build CC-Switch Web (Linux x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend (Web mode)
        run: npm run build:web

      - name: Verify frontend build
        run: |
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Frontend build failed: dist/index.html not found"
            exit 1
          fi
          echo "✓ Frontend built successfully"
          ls -la dist/

      - name: Build backend (Release mode)
        run: |
          cargo build --release --manifest-path crates/server/Cargo.toml
          ls -lah crates/server/target/release/cc-switch-web

      - name: Create release package
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BUILD_DIR="release-web"
          ARCHIVE_NAME="cc-switch-web-linux-x64-v${VERSION}.tar.gz"

          mkdir -p "$BUILD_DIR"

          # Copy binary
          cp crates/server/target/release/cc-switch-web "$BUILD_DIR/"
          chmod +x "$BUILD_DIR/cc-switch-web"

          # Create run script
          cat > "$BUILD_DIR/run.sh" << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          export CC_SWITCH_PORT=${CC_SWITCH_PORT:-17666}
          export CC_SWITCH_HOST=${CC_SWITCH_HOST:-127.0.0.1}
          ./cc-switch-web "$@"
          EOF
          chmod +x "$BUILD_DIR/run.sh"

          # Create systemd service
          cat > "$BUILD_DIR/cc-switch-web.service" << 'EOF'
          [Unit]
          Description=CC-Switch Web Server
          After=network.target

          [Service]
          Type=simple
          User=%i
          WorkingDirectory=/opt/cc-switch-web
          ExecStart=/opt/cc-switch-web/cc-switch-web
          Restart=on-failure
          RestartSec=5
          Environment=CC_SWITCH_PORT=17666
          Environment=CC_SWITCH_HOST=0.0.0.0

          [Install]
          WantedBy=multi-user.target
          EOF

          # Create README
          cat > "$BUILD_DIR/README.md" << 'EOF'
          # CC-Switch Web Server

          A standalone Web version of CC-Switch for headless/SSH environments.

          ## Quick Start

          ```bash
          # Run
          ./cc-switch-web

          # Or use run script
          ./run.sh
          ```

          Then open http://localhost:17666 in your browser.

          ## Configuration

          ```bash
          # Custom port
          CC_SWITCH_PORT=8080 ./cc-switch-web

          # Listen on all interfaces
          CC_SWITCH_HOST=0.0.0.0 ./cc-switch-web

          # Authentication token (optional)
          CC_SWITCH_AUTH_TOKEN=your-secret ./cc-switch-web
          ```

          ## System Service

          ```bash
          sudo mkdir -p /opt/cc-switch-web
          sudo cp cc-switch-web run.sh /opt/cc-switch-web/
          sudo chmod +x /opt/cc-switch-web/*
          sudo cp cc-switch-web.service /etc/systemd/system/
          sudo systemctl daemon-reload
          sudo systemctl enable cc-switch-web
          sudo systemctl start cc-switch-web
          ```

          ## Data Location

          - Database: `~/.cc-switch/cc-switch.db`
          - Settings: `~/.cc-switch/settings.json`
          - Claude config: `~/.claude.json`

          ## More Info

          Visit https://github.com/farion1231/cc-switch for full documentation.
          EOF

          # Create archive
          tar -czf "$ARCHIVE_NAME" -C "$BUILD_DIR" .

          # Output info
          BINARY_SIZE=$(du -h "$BUILD_DIR/cc-switch-web" | cut -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "BINARY_SIZE=$BINARY_SIZE" >> $GITHUB_ENV

          echo "::notice::Build complete - Binary: $BINARY_SIZE, Archive: $ARCHIVE_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cc-switch-web-linux-x64
          path: cc-switch-web-linux-x64-*.tar.gz
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: cc-switch-web-linux-x64-*.tar.gz
          body: |
            ## CC-Switch Web Version v${{ env.VERSION }}

            **For headless/SSH server environments**

            ### What's Included
            - Single binary (x86_64 Linux, ~${{ env.BINARY_SIZE }})
            - Embedded React frontend
            - WebSocket + JSON-RPC 2.0 API
            - Zero external dependencies

            ### Quick Start
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.ARCHIVE_NAME }}
            tar -xzf ${{ env.ARCHIVE_NAME }}
            cd cc-switch-web
            ./cc-switch-web
            ```

            Then open http://localhost:17666

            ### Features
            - ✅ All desktop features available
            - ✅ Auto port selection on conflict
            - ✅ Shares data with desktop version
            - ✅ systemd service support

            See [README](https://github.com/${{ github.repository }}#web-version-headless--ssh-server) for full documentation.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
